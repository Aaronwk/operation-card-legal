  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;max-width:760px;margin:40px auto;padding:0 20px;line-height:1.8;color:#1f2933}

<body>
  <h1>操作卡隐私政策</h1>
  <p>更新日期：2026 年 6 月 6 日</p>
  <h2>数据存储</h2>
  <p>操作卡不创建账号。用户创建的操作卡、步骤说明、选择的截图和标注默认保存在用户设备本地，不会上传到开发者服务器。</p>
  <h2>照片访问</h2>
  <p>本 App 使用系统照片选择器，用户主动选择的图片会用于制作操作卡。App 不会读取完整相册，也不会上传图片内容。</p>
  <h2>订阅</h2>
  <p>订阅购买、续订、取消和退款由 Apple App Store 处理。开发者不会获取完整银行卡信息。</p>
  <h2>第三方服务</h2>
  <p>首版不使用广告 SDK，不使用第三方分析 SDK，不提供社交或远程控制功能。</p>
  <h2>联系我们</h2>
  <p>如有问题，请联系：jlrslwang@163.com</p>
</body>
</html>
